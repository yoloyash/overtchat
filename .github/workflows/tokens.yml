name: Update source token count

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'AGENTS.md'
      - 'Dockerfile'
      - 'compose.yml'
      - '.github/actions/repo-tokens/**'
      - '.github/workflows/tokens.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: ./.github/actions/repo-tokens
        id: tokens
        with:
          include: >-
            apps/web/app/**/*.ts
            apps/web/app/**/*.tsx
            apps/web/components/**/*.ts
            apps/web/components/**/*.tsx
            apps/web/lib/**/*.ts
            apps/web/lib/**/*.tsx
            apps/web/instrumentation.ts
            apps/web/next.config.ts
            apps/web/scripts/**/*.ts
            apps/mobile/src/**/*.ts
            apps/mobile/src/**/*.tsx
            apps/mobile/scripts/**/*.mjs
            apps/mobile/app.json
            apps/mobile/eas.json
            packages/shared/src/**/*.ts
            packages/shared/src/**/*.tsx
            packages/shared/scripts/**/*.ts
            AGENTS.md
            apps/web/AGENTS.md
            apps/mobile/AGENTS.md
            Dockerfile
            compose.yml
          exclude: >-
            **/*.test.ts
            **/*.test.tsx
            **/*.spec.ts
            **/*.spec.tsx
            **/node_modules/**
            **/dist/**
          badge-path: '.github/badges/tokens.svg'

      - name: Commit if changed
        run: |
          git add README.md .github/badges/tokens.svg
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: update source token count to ${{ steps.tokens.outputs.badge }}"
          git pull --rebase
          git push
