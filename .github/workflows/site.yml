name: Project site

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/site.yml"
      - "apps/site/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - "wrangler.jsonc"
  pull_request:
    paths:
      - ".github/workflows/site.yml"
      - "apps/site/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - "wrangler.jsonc"
  release:
    types: [published, edited, deleted]
  workflow_dispatch:

permissions: {}

concurrency:
  group: project-site-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name != 'release'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use pinned npm
        run: npm install --global npm@10.9.8

      - run: npm ci

      - name: Validate project site
        run: |
          npm run lint -w apps/site --
          npm run test -w apps/site --

      - name: Build static site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_SITE_ORIGIN: https://overtchat.com
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build -w apps/site --

  rebuild-releases:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Rebuild Cloudflare site from main
        env:
          DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_SITE_DEPLOY_HOOK }}
        run: |
          test -n "$DEPLOY_HOOK_URL"
          curl --fail --silent --show-error \
            --retry 2 \
            --retry-all-errors \
            --request POST \
            "$DEPLOY_HOOK_URL"
