name: Mobile release

on:
  push:
    tags: ["mobile-v*"]
  workflow_dispatch:

jobs:
  android:
    runs-on: self-hosted
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check mobile version
        id: version
        run: |
          VERSION="$(node -p "require('./apps/mobile/app.json').expo.version")"
          PACKAGE_VERSION="$(node -p "require('./apps/mobile/package.json').version")"
          VERSION_CODE="$(node -p "require('./apps/mobile/app.json').expo.android.versionCode")"
          EXPECTED_TAG="mobile-v${VERSION}"

          test "$PACKAGE_VERSION" = "$VERSION"
          test "$VERSION_CODE" != "undefined"

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            test "${GITHUB_REF_NAME}" = "$EXPECTED_TAG"
          fi

          {
            echo "version=$VERSION"
            echo "version_code=$VERSION_CODE"
            echo "expected_tag=$EXPECTED_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Install local Android credentials
        run: |
          if [[ -f apps/mobile/credentials.json ]]; then
            exit 0
          fi

          CREDENTIALS_DIR="${OVERTCHAT_MOBILE_CREDENTIALS_DIR:-$HOME/.overtchat/mobile-credentials}"
          cp "$CREDENTIALS_DIR/credentials.json" apps/mobile/credentials.json
          cp -R "$CREDENTIALS_DIR/credentials" apps/mobile/credentials

      - name: Build AAB locally
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          mkdir -p ../../dist/mobile
          npx eas-cli@20 build --local --non-interactive \
            --platform android --profile production \
            --output "../../dist/mobile/overtchat-v${{ steps.version.outputs.version }}.aab"

      - name: Build APK locally
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          mkdir -p ../../dist/mobile
          npx eas-cli@20 build --local --non-interactive \
            --platform android --profile production-apk \
            --output "../../dist/mobile/overtchat-v${{ steps.version.outputs.version }}.apk"

      - name: Submit AAB to Play
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli@20 submit --non-interactive \
            --platform android --profile production \
            --path "../../dist/mobile/overtchat-v${{ steps.version.outputs.version }}.aab"

      - name: Attach APK to GitHub release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.expected_tag }}"
          APK="dist/mobile/overtchat-v${{ steps.version.outputs.version }}.apk"

          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --draft --title "$TAG" --notes "Draft - fill in notes before publishing."
          gh release upload "$TAG" "$APK" --clobber
