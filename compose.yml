services:
  app:
    image: ghcr.io/yoloyash/overtchat-app:${APP_VERSION:-0.9.7}
    build: .
    container_name: overtchat-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4718}:4717"
    environment:
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4718}
      SEARXNG_URL: http://searxng:8080
      KOKORO_URL: http://kokoro:8880
      STT_URL: http://stt:5092
      DATABASE_URL: /app/data/chat.db
      REDIS_URL: redis://redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - overtchat-data:/app/data
    depends_on:
      searxng:
        condition: service_healthy
      kokoro:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Tiny Redis sidecar used as the buffer for resumable assistant streams.
  # No persistence, 64 MB cap, LRU eviction — if a key is lost, the worst
  # case is a client falls back to its already-loaded message history.
  redis:
    image: redis:8-alpine@sha256:d146f83b1e0f02fc27c26a50cee39338c736674c5959db84363e6ae3cd9e02d2
    container_name: overtchat-redis
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: overtchat-searxng
    restart: unless-stopped
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${SEARXNG_PORT:-8088}:8080"
    environment:
      FORCE_OWNERSHIP: "false"
      SEARXNG_SECRET: ${SEARXNG_SECRET:?set SEARXNG_SECRET in .env}
    volumes:
      - ./searxng:/etc/searxng:rw
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.4
    container_name: overtchat-kokoro
    restart: unless-stopped
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${KOKORO_PORT:-8880}:8880"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8880/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  # Speech-to-text via Parakeet TDT v3. Off by default; opt in with:
  #   docker compose --profile stt up -d        (CPU, ~670MB model, ~2GB RAM)
  #   docker compose --profile stt-gpu up -d    (NVIDIA GPU, requires NVIDIA Container Toolkit)
  # Both services are reachable from `app` as `http://stt:5092`.
  stt-cpu:
    image: ghcr.io/yoloyash/overtchat-stt-cpu:${STT_VERSION:-0.1.0}
    build:
      context: ./stt
      dockerfile: Dockerfile.cpu
    container_name: overtchat-stt-cpu
    restart: unless-stopped
    profiles: [stt]
    networks:
      default:
        aliases: [stt]
    volumes:
      - overtchat-stt-models:/models

  stt-gpu:
    image: ghcr.io/yoloyash/overtchat-stt-gpu:${STT_VERSION:-0.1.0}
    build:
      context: ./stt
      dockerfile: Dockerfile.gpu
    container_name: overtchat-stt-gpu
    restart: unless-stopped
    profiles: [stt-gpu]
    networks:
      default:
        aliases: [stt]
    volumes:
      - overtchat-stt-models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # To expose overtchat via Cloudflare Tunnel, uncomment below and paste your
  # tunnel token. Nothing else on this stack is reachable from the internet —
  # searxng and kokoro stay on the internal Docker network.
  #
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: overtchat-cloudflared
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     app:
  #       condition: service_started

volumes:
  overtchat-data:
  overtchat-stt-models:
