services:
  app:
    build: .
    container_name: overtchat-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4718}:4717"
    environment:
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4718}
      SEARXNG_URL: http://searxng:8080
      DATABASE_URL: /app/data/chat.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - overtchat-data:/app/data
    depends_on:
      searxng:
        condition: service_started

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: overtchat-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SEARXNG_PORT:-8088}:8080"
    environment:
      SEARXNG_BASE_URL: http://localhost:${SEARXNG_PORT:-8088}/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me-in-production}
    volumes:
      - ./searxng:/etc/searxng:rw

volumes:
  overtchat-data:
